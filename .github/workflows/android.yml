name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Compile Web Assets
        env:
          VITE_SKIP_TYPECHECK: "true"
          TSC_COMPILE_ON_ERROR: "true"
        run: |
          npm run build || true
          mkdir -p dist
          if [ ! -f dist/index.html ]; then cp index.html dist/index.html || true; fi

      - name: Initialize Native Android Container
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Habittos com.mrsavage009.habittos --web-dir=dist
          npx cap add android
          
          # Patch duplicate Kotlin library dependencies inside Gradle config
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> android/build.gradle
          
          npx cap sync

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Compile and Export Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Habittos-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
